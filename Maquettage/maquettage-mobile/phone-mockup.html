<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Phone Component - BlassaCar</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Preline UI -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        sky: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
                            400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
                            800: '#075985', 900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-transparent flex justify-center items-center p-8">

    <!-- Mobile Phone Device Frame -->
    <div
        class="relative mx-auto border-gray-800 dark:border-gray-800 bg-gray-800 border-[14px] rounded-[2.5rem] h-[800px] w-[380px] shadow-xl">
        <!-- Top Notch -->
        <div class="w-[148px] h-[18px] bg-gray-800 top-0 rounded-b-[1rem] left-1/2 -translate-x-1/2 absolute z-20">
        </div>

        <!-- Left Buttons -->
        <div class="h-[46px] w-[3px] bg-gray-800 absolute -left-[17px] top-[124px] rounded-l-lg"></div>
        <div class="h-[46px] w-[3px] bg-gray-800 absolute -left-[17px] top-[178px] rounded-l-lg"></div>

        <!-- Right Button -->
        <div class="h-[64px] w-[3px] bg-gray-800 absolute -right-[17px] top-[142px] rounded-r-lg"></div>

        <!-- Screen Viewport -->
        <div class="rounded-[2rem] overflow-hidden w-[352px] h-[772px] bg-gray-50 relative">

            <!-- Mobile Content Inside Phone -->
            <div class="h-full flex flex-col relative overflow-y-auto pb-20 no-scrollbar">

                <!-- Header -->
                <header
                    class="bg-white border-b border-gray-200 px-4 py-4 pt-8 sticky top-0 z-10 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <svg class="w-8 h-8 text-sky-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                        <span class="font-bold text-gray-900 text-lg">BlassaCar</span>
                    </div>
                    <button class="text-gray-500 hover:text-gray-900">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                        </svg>
                    </button>
                </header>

                <!-- Hero Search -->
                <div class="bg-sky-600 text-white px-4 py-8 rounded-b-3xl">
                    <h1 class="text-2xl font-bold mb-2">Où allez-vous ?</h1>
                    <p class="text-sky-100 text-sm mb-6">Trouvez un covoiturage partout au Maroc</p>

                    <form class="bg-white rounded-2xl shadow-lg p-2 flex flex-col gap-2">
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </div>
                            <input type="text"
                                class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full pl-10 p-3"
                                placeholder="Départ">
                        </div>

                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                                    </path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </div>
                            <input type="text"
                                class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full pl-10 p-3"
                                placeholder="Destination">
                        </div>

                        <div class="flex gap-2">
                            <div class="relative w-1/2">
                                <input type="date"
                                    class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full p-3">
                            </div>
                            <div class="relative w-1/2">
                                <input type="number" min="1" value="1"
                                    class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full p-3"
                                    placeholder="Passagers">
                            </div>
                        </div>

                        <button type="button"
                            class="mt-2 w-full text-white bg-sky-600 hover:bg-sky-700 font-medium rounded-xl text-sm px-5 py-3.5 text-center transition">Rechercher</button>
                    </form>
                </div>

                <!-- Recent Rides -->
                <div class="p-4 mt-4">
                    <h2 class="text-lg font-bold text-gray-900 mb-4">Trajets récents</h2>

                    <div class="space-y-4">
                        <!-- Ride Card 1 -->
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                            <div class="flex justify-between items-center mb-3">
                                <div class="flex items-center gap-3">
                                    <div
                                        class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-bold text-gray-600">
                                        AM</div>
                                    <div>
                                        <h3 class="font-semibold text-gray-900 text-sm">Amine M.</h3>
                                        <div class="flex items-center text-xs text-yellow-500">
                                            ★ 4.8 <span class="text-gray-500 ml-1">(42 avis)</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="font-bold text-lg text-sky-600">120 DH</span>
                                </div>
                            </div>

                            <div class="relative pl-4 border-l-2 border-gray-200 ml-2 space-y-4">
                                <div class="relative">
                                    <div
                                        class="absolute w-3 h-3 bg-white border-2 border-sky-600 rounded-full -left-[23px] top-1">
                                    </div>
                                    <p class="text-sm font-semibold text-gray-900">08:00 <span
                                            class="text-gray-500 font-normal ml-2">Casablanca</span></p>
                                </div>
                                <div class="relative">
                                    <div
                                        class="absolute w-3 h-3 bg-white border-2 border-sky-600 rounded-full -left-[23px] top-1">
                                    </div>
                                    <p class="text-sm font-semibold text-gray-900">11:30 <span
                                            class="text-gray-500 font-normal ml-2">Marrakech</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- Bottom Navigation Bar -->
            <div
                class="absolute bottom-0 left-0 w-full bg-white border-t border-gray-200 px-6 py-3 flex justify-between items-center z-20 pb-8">
                <a href="#" class="flex flex-col items-center text-sky-600">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <span class="text-[10px] font-medium">Rechercher</span>
                </a>
                <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-900 transition">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span class="text-[10px] font-medium">Publier</span>
                </a>
                <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-900 transition">
                    <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span class="text-[10px] font-medium">Profil</span>
                </a>
            </div>

        </div>
    </div>

    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.js"></script>
</body>

</html>
