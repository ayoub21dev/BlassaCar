<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recent Rides Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { sky: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' } } } }
        }
    </script>
</head>

<body class="bg-gray-50 flex justify-center items-center min-h-[300px] p-4">
    <div class="w-[352px] bg-white rounded-[2rem] overflow-hidden shadow-lg border border-gray-200 p-4">
        <h2 class="text-lg font-bold text-gray-900 mb-4">Trajets récents</h2>

        <div class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center font-bold text-gray-600">
                            AM</div>
                        <div>
                            <h3 class="font-semibold text-gray-900 text-sm">Amine M.</h3>
                            <div class="flex items-center text-xs text-yellow-500">
                                ★ 4.8 <span class="text-gray-500 ml-1">(42 avis)</span>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="font-bold text-lg text-sky-600">120 DH</span>
                    </div>
                </div>

                <div class="relative pl-4 border-l-2 border-gray-200 ml-2 space-y-4">
                    <div class="relative">
                        <div class="absolute w-3 h-3 bg-white border-2 border-sky-600 rounded-full -left-[23px] top-1">
                        </div>
                        <p class="text-sm font-semibold text-gray-900">08:00 <span
                                class="text-gray-500 font-normal ml-2">Casablanca</span></p>
                    </div>
                    <div class="relative">
                        <div class="absolute w-3 h-3 bg-white border-2 border-sky-600 rounded-full -left-[23px] top-1">
                        </div>
                        <p class="text-sm font-semibold text-gray-900">11:30 <span
                                class="text-gray-500 font-normal ml-2">Marrakech</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
