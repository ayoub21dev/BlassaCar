<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Hero Search Component</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { sky: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' } } } }
        }
    </script>
</head>

<body class="bg-gray-50 flex justify-center items-center min-h-[500px] p-4">
    <div class="w-[352px] bg-white rounded-[2rem] overflow-hidden shadow-lg border border-gray-200">
        <div class="bg-sky-600 text-white px-4 py-8 rounded-b-3xl">
            <h1 class="text-2xl font-bold mb-2">Où allez-vous ?</h1>
            <p class="text-sky-100 text-sm mb-6">Trouvez un covoiturage partout au Maroc</p>

            <form class="bg-white rounded-2xl shadow-lg p-2 flex flex-col gap-2">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    <input type="text"
                        class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full pl-10 p-3"
                        placeholder="Départ">
                </div>

                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    <input type="text"
                        class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full pl-10 p-3"
                        placeholder="Destination">
                </div>

                <div class="flex gap-2">
                    <div class="relative w-1/2">
                        <input type="date"
                            class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full p-3">
                    </div>
                    <div class="relative w-1/2">
                        <input type="number" min="1" value="1"
                            class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 block w-full p-3"
                            placeholder="Passagers">
                    </div>
                </div>

                <button type="button"
                    class="mt-2 w-full text-white bg-sky-600 hover:bg-sky-700 font-medium rounded-xl text-sm px-5 py-3.5 text-center transition">Rechercher</button>
            </form>
        </div>
    </div>
</body>

</html>
