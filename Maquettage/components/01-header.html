<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header Component</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50">

<!-- ============================================ -->
<!-- BlassaCar Header / Navigation Component      -->
<!-- ============================================ -->

<header class="sticky top-0 z-50 w-full bg-white border-b border-gray-200">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <a href="#" class="flex items-center gap-3" aria-label="BlassaCar Home">
          <div class="relative w-11 h-11 flex items-center justify-center">
            <div class="absolute inset-0 rounded-2xl bg-gradient-to-br from-cyan-400 via-sky-500 to-blue-700 shadow-lg shadow-sky-500/35"></div>
            <div class="absolute inset-[2px] rounded-[14px] bg-white/10"></div>
            <svg class="relative w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20s5-4.5 5-8.5a5 5 0 1 0-10 0c0 4 5 8.5 5 8.5z"/>
              <path d="M12 8v1.2"/>
              <path d="M12 10.9v1.2"/>
              <path d="M12 13.8v1.2"/>
            </svg>
          </div>
          <span class="flex flex-col leading-none">
            <span class="text-[1.35rem] font-extrabold tracking-[-0.02em]"><span class="text-gray-900">Blassa</span><span class="text-sky-600">Car</span></span>
            <span class="hidden lg:block text-[10px] uppercase tracking-[0.18em] text-gray-400 mt-1">Ride Morocco</span>
          </span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-1">
        <a href="#" class="flex items-center gap-2 px-4 py-2 text-gray-700 hover:text-sky-600 font-medium transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
          Search
        </a>
        <a href="#" class="flex items-center gap-2 px-4 py-2 text-gray-700 hover:text-sky-600 font-medium transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" x2="12" y1="8" y2="16"/>
            <line x1="8" x2="16" y1="12" y2="12"/>
          </svg>
          Publish a ride
        </a>
        
        <!-- Divider -->
        <div class="w-px h-6 bg-gray-300 mx-2"></div>
        
        <a href="#" class="px-4 py-2 text-gray-700 hover:text-sky-600 font-medium transition-colors">
          Log in
        </a>
        <a href="#" class="flex items-center gap-2 px-5 py-2.5 bg-sky-500 text-white font-medium rounded-full hover:bg-sky-600 transition-colors ml-2">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          Sign up
        </a>
      </div>

        <!-- User Menu (Logged In) -->
        <div class="hs-dropdown relative inline-flex">
          <button id="user-menu" class="hs-dropdown-toggle flex items-center gap-2 text-gray-700 hover:text-gray-900 focus:outline-none">
            <div class="w-9 h-9 rounded-full bg-gradient-to-br from-sky-500 to-blue-600 flex items-center justify-center text-white font-medium text-sm">
              MJ
            </div>
            <svg class="w-4 h-4 hs-dropdown-open:rotate-180 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m6 9 6 6 6-6"/>
            </svg>
          </button>
          
          <div class="hs-dropdown-menu hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-gray-200 py-2">
            <div class="px-4 py-3 border-b border-gray-100">
              <p class="text-sm font-medium text-gray-900">Mohamed Jalyta</p>
              <p class="text-xs text-gray-500">mohamed@email.com</p>
            </div>
            <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              My Profile
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
              </svg>
              My Trips
            </a>
            <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">
              <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              Messages
            </a>
            <div class="border-t border-gray-100 mt-2 pt-2">
              <a href="#" class="flex items-center gap-3 px-4 py-2 text-sm text-red-600 hover:bg-red-50">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" x2="9" y1="12" y2="12"/>
                </svg>
                Sign Out
              </a>
            </div>
          </div>
        </div>

        <!-- Mobile Menu Button -->
        <button class="md:hidden p-2 text-gray-600 hover:text-gray-900" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
          <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" x2="21" y1="6" y2="6"/>
            <line x1="3" x2="21" y1="12" y2="12"/>
            <line x1="3" x2="21" y1="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-200 py-4">
      <div class="flex flex-col gap-2">
        <a href="#" class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 rounded-lg">Search Rides</a>
        <a href="#" class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 rounded-lg">Post a Ride</a>
        <a href="#" class="px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 rounded-lg">How it Works</a>
        <hr class="my-2">
        <a href="#" class="px-4 py-2 text-sm font-medium text-sky-600 hover:bg-sky-50 rounded-lg">Sign In</a>
        <a href="#" class="mx-4 py-2 text-sm font-medium text-center text-white bg-sky-600 rounded-lg hover:bg-sky-700">Sign Up</a>
      </div>
    </div>
  </nav>
</header>

<!-- Required: Preline UI Script -->
<script src="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.js"></script>

</body>
</html>
