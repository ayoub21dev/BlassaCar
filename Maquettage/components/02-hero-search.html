<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Search Component</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1'
            }
          }
        }
      }
    }
  </script>
</head>
<body>

<!-- ============================================ -->
<!-- BlassaCar Hero + Search Component            -->
<!-- ============================================ -->

<section class="relative bg-gradient-to-br from-sky-50 via-white to-blue-50 py-16 lg:py-24 overflow-hidden">
  <!-- Background Pattern -->
  <div class="absolute inset-0 opacity-30">
    <svg class="absolute top-0 left-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
      <defs>
        <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.5" fill="#0ea5e9" opacity="0.3"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
    </svg>
  </div>

  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center max-w-3xl mx-auto mb-12">
      <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-gray-900 mb-6">
        Travel Between Cities <br>
        <span class="text-sky-600">Simple & Affordable</span>
      </h1>
      <p class="text-lg text-gray-600">
        Join thousands of Moroccans sharing rides between cities. Safe, verified, and cheaper than buses.
      </p>
    </div>

    <!-- Search Bar (Inline Design) -->
    <div class="max-w-5xl mx-auto">
      <div class="bg-white rounded-2xl shadow-xl border-2 border-sky-500 p-2">
        <form class="flex flex-col lg:flex-row items-stretch">
          
          <!-- Leaving From -->
          <div class="flex-1 flex items-center gap-3 px-4 py-3 border-b lg:border-b-0 lg:border-r border-gray-200">
            <svg class="w-5 h-5 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <div class="flex-1">
              <input type="text" placeholder="Leaving from" class="w-full text-gray-900 placeholder-gray-500 bg-transparent border-none focus:outline-none focus:ring-0 p-0 text-base">
            </div>
          </div>

          <!-- Going To -->
          <div class="flex-1 flex items-center gap-3 px-4 py-3 border-b lg:border-b-0 lg:border-r border-gray-200">
            <svg class="w-5 h-5 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <div class="flex-1">
              <input type="text" placeholder="Going to" class="w-full text-gray-900 placeholder-gray-500 bg-transparent border-none focus:outline-none focus:ring-0 p-0 text-base">
            </div>
          </div>

          <!-- Date -->
          <div class="flex-1 flex items-center gap-3 px-4 py-3 border-b lg:border-b-0 lg:border-r border-gray-200">
            <svg class="w-5 h-5 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" x2="16" y1="2" y2="6"/>
              <line x1="8" x2="8" y1="2" y2="6"/>
              <line x1="3" x2="21" y1="10" y2="10"/>
            </svg>
            <div class="flex-1 relative">
              <input type="date" placeholder="mm/dd/yyyy" class="w-full text-gray-900 placeholder-gray-500 bg-transparent border-none focus:outline-none focus:ring-0 p-0 text-base cursor-pointer date-picker">
            </div>
          </div>
          
          <style>
            .date-picker::-webkit-calendar-picker-indicator {
              position: absolute;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              width: 100%;
              height: 100%;
              opacity: 0;
              cursor: pointer;
            }
          </style>

          <!-- Passengers -->
          <div class="flex-1 flex items-center gap-3 px-4 py-3">
            <svg class="w-5 h-5 text-gray-400 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <div class="flex-1">
              <select class="w-full text-gray-900 bg-transparent border-none focus:outline-none focus:ring-0 p-0 cursor-pointer text-base">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
              </select>
            </div>
          </div>

          <!-- Search Button -->
          <button type="submit" class="px-8 py-4 bg-sky-600 text-white font-semibold rounded-xl hover:bg-sky-700 transition-colors flex items-center justify-center gap-2 lg:ml-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
            Search
          </button>
        </form>
      </div>
    </div>


  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.js"></script>

</body>
</html>
