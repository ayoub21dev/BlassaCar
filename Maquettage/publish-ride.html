<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publish a Ride - BlassaCar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@preline/preline@2.0.3/dist/preline.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            sky: {
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
              800: '#075985', 900: '#0c4a6e',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <!-- Header -->
  <header class="sticky top-0 z-50 w-full bg-white border-b border-gray-200">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <div class="flex items-center gap-3">
          <a href="website.html" class="flex items-center" aria-label="BlassaCar Home">
            <img src="assets/blasacar-logo.png" alt="BlassaCar logo" class="h-14 w-auto object-contain">
          </a>
        </div>
        <div class="hidden md:flex items-center gap-4">
          <a href="website.html" class="px-4 py-2 text-gray-700 hover:text-sky-600 font-medium transition-colors">Search</a>
          <a href="components/11-login.html" class="px-4 py-2 text-gray-700 hover:text-sky-600 font-medium transition-colors">Log in</a>
          <a href="components/10-signup.html" class="px-5 py-2.5 bg-sky-500 text-white font-medium rounded-full hover:bg-sky-600 transition-colors">Sign up</a>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="flex-1 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-gray-900">Publish a Ride</h1>
        <p class="mt-2 text-gray-600 text-lg">Help others travel affordably and save on your fuel costs.</p>
      </div>
      
      <!-- Trip Post Form Component (Inlined for standalone page) -->
      <div class="bg-white rounded-3xl shadow-xl shadow-sky-900/5 border border-gray-200 overflow-hidden">
        <div class="bg-gradient-to-r from-sky-500 to-sky-600 px-8 py-6">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-white backdrop-blur-sm">
              <svg class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 5v14M5 12h14"/>
              </svg>
            </div>
            <div>
              <h2 class="text-2xl font-bold text-white leading-none">Trip Details</h2>
              <p class="text-sky-50 text-sm mt-1">Complete the information below to list your ride.</p>
            </div>
          </div>
        </div>

        <form class="p-8 space-y-8">
          <!-- Route -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-700">From</label>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-sky-500 transition-colors">
                  <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                </div>
                <input type="text" placeholder="Departure city" class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 transition-all font-medium">
              </div>
            </div>
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-700">To</label>
              <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-sky-500 transition-colors">
                   <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <input type="text" placeholder="Destination city" class="w-full pl-12 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 transition-all font-medium">
              </div>
            </div>
          </div>

          <!-- Time & Price -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-700">Date</label>
              <input type="date" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 transition-all font-medium">
            </div>
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-700">Seats</label>
              <select class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 transition-all font-medium appearance-none">
                <option>1 seat</option>
                <option>2 seats</option>
                <option>3 seats</option>
                <option>4 seats</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="block text-sm font-semibold text-gray-700">Price (DH)</label>
              <input type="number" placeholder="50" class="w-full px-4 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-sky-500/10 focus:border-sky-500 transition-all font-medium">
            </div>
          </div>

          <!-- Action -->
          <div class="pt-6">
            <button type="submit" class="w-full py-4 bg-sky-500 text-white text-lg font-bold rounded-2xl hover:bg-sky-600 shadow-lg shadow-sky-500/25 transition-all transform active:scale-[0.98]">
              Publish My Ride
            </button>
            <p class="text-center text-sm text-gray-500 mt-4 leading-relaxed">
              By publishing, you agree to our <a href="#" class="text-sky-600 hover:underline">Driver Guidelines</a> and <a href="#" class="text-sky-600 hover:underline">Terms of Service</a>.
            </p>
          </div>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 py-10 mt-auto">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <img src="assets/blasacar-logo.png" alt="BlassaCar" class="h-8 mx-auto mb-4 opacity-50 grayscale hover:grayscale-0 transition-all">
      <p class="text-sm text-gray-400">© 2026 BlassaCar. Safe and sustainable travels across Morocco.</p>
    </div>
  </footer>

</body>
</html>
